<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balenrista - Display System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --card-dark: #1C1C1E;
            --text-main: #F5F5F5;
            --accent-yellow: #EEDC82;
            --accent-orange: #E66430;
        }

        body { font-family: 'Prompt', sans-serif; background-color: var(--bg-dark); margin: 0; padding: 30px; height: 100vh; box-sizing: border-box; display: flex; gap: 30px; overflow: hidden; color: var(--text-main); }
        .left-panel, .right-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        /* เอาขอบโลโก้ออกแล้วครับ */
        .brand-header { display: flex; align-items: center; gap: 15px; padding: 0 10px; margin-bottom: 5px; }
        .shop-logo { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; } 
        .shop-name { font-size: 40px; font-weight: 700; color: var(--text-main); margin: 0; }
        .shop-name span { font-weight: 300; opacity: 0.7; color: var(--accent-yellow); }

        .card-ready { background-color: var(--card-dark); border-radius: 40px; padding: 30px; flex: 1.4; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .card-brewing { background-color: var(--card-dark); border-radius: 40px; padding: 30px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        
        .q-ready { font-size: 150px; font-weight: 700; color: var(--bg-dark); background: var(--accent-orange); padding: 10px 70px; border-radius: 40px; line-height: 1; margin-top: 15px; box-shadow: 0 15px 40px rgba(230, 100, 48, 0.4); transition: transform 0.3s; }
        .brewing-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 20px; width: 100%; }
        .brewing-item { background: #2A2A2C; color: var(--text-main); font-size: 26px; font-weight: 600; padding: 8px 20px; border-radius: 18px; animation: fadeIn 0.4s ease-in-out; }
        
        .media-container { width: 100%; height: 100%; border-radius: 40px; overflow: hidden; position: relative; background: #111; }
        .media-content { width: 100%; height: 100%; object-fit: cover; }

        #unlock-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .unlock-btn { background: var(--accent-yellow); color: var(--bg-dark); padding: 20px 50px; border-radius: 50px; font-size: 40px; font-weight: 700; margin-bottom: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="unlock-overlay">
        <div class="unlock-btn">👆 แตะที่นี่เพื่อเริ่มระบบ</div>
        <p style="color: #8E8D93; font-size: 24px;">(เพื่อเปิดใช้งานระบบเสียง)</p>
    </div>

    <div class="left-panel">
        <div class="brand-header">
            <img src="IMG_3672.png" alt="Logo" class="shop-logo" onerror="this.src='https://images.unsplash.com/photo-1511920170033-f8396924c348?ixlib=rb-1.2.1&auto=format&fit=crop&w=200&q=80'">
            <h1 class="shop-name">Balenrista<span>.</span></h1>
        </div>

        <div class="card-ready">
            <h2 style="color: var(--accent-yellow); font-size: 40px; margin: 0;">✅ Ready</h2>
            <div id="display-ready" class="q-ready">0</div>
        </div>
        
        <div class="card-brewing">
            <h3 style="color: #8E8D93; font-size: 22px; margin: 0;">☕ กำลังทำอยู่ (Preparing)</h3>
            <div id="brewing-list-display" class="brewing-list"></div>
        </div>
    </div>

    <div class="right-panel">
        <div class="media-container" id="media-viewer">
            <img class="media-content" src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=1000&q=80">
        </div>
    </div>

    <audio id="queue-audio" playsinline></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDITDHyj_6Z80vTp209yHUR8QHR2fAh-R0",
        databaseURL: "https://balenrista---queue-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "balenrista---queue"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let audioUnlocked = false;
    let player = document.getElementById('queue-audio');

    // ระบบเสียง
    function playSequence(playlist, index) {
        if (index >= playlist.length) return;
        player.src = playlist[index];
        player.onended = () => playSequence(playlist, index + 1);
        player.play().catch(console.log);
    }

    document.getElementById('unlock-overlay').addEventListener('click', () => {
        player.src = "0.mp3"; 
        player.volume = 0.01;
        player.play().then(() => {
            audioUnlocked = true;
            document.getElementById('unlock-overlay').style.display = 'none';
        });
    });

    // อัปเดตคิวหลัก
    onValue(ref(db, 'queue/current'), (s) => {
        const val = s.val();
        document.getElementById('display-ready').innerText = val || "0";
        if (audioUnlocked && val) playSequence([val.toString()+".mp3", "Call.mp3"], 0);
    });

    // อัปเดตรายการกำลังทำ
    onValue(ref(db, 'queue/waiting_list'), (s) => {
        const data = s.val();
        const container = document.getElementById('brewing-list-display');
        if (data) {
            container.innerHTML = Object.values(data).slice(0, 10).map(i => `<div class="brewing-item">#${i.queue_number}</div>`).join('');
        } else {
            container.innerHTML = `<p style="color:#555;">ไม่มีออเดอร์ค้าง</p>`;
        }
    });

    // อัปเดตสื่อ
    onValue(ref(db, 'media/current'), (s) => {
        const m = s.val();
        if(m) document.getElementById('media-viewer').innerHTML = m.type === 'video' ? 
            `<video class="media-content" autoplay loop muted playsinline><source src="${m.data}"></video>` : 
            `<img class="media-content" src="${m.data}">`;
    });
</script>
</body>
</html>
