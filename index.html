<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balenrista - Customer Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #F8F6F0; margin: 0; padding: 20px; height: 100vh; box-sizing: border-box; display: flex; gap: 20px; overflow: hidden; }
        .left-panel, .right-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .card { background-color: #FFFFFF; border-radius: 30px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card-header { margin-bottom: 30px; border-bottom: 2px dashed #E0E0E0; padding-bottom: 20px; }
        .card-header h2 { font-size: 36px; margin: 0; font-weight: 600; }
        .number-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center; flex: 1; }
        .q-ready { font-size: 130px; font-weight: 700; color: #4CAF50; background: #E8F5E9; padding: 20px 60px; border-radius: 30px; line-height: 1; box-shadow: 0 8px 25px rgba(76, 175, 80, 0.15); }
        .media-content { width: 100%; height: 100%; object-fit: cover; border-radius: 30px; }
        .brand-logo { position: absolute; top: 30px; right: 40px; background: rgba(255, 255, 255, 0.9); padding: 10px 25px; border-radius: 50px; font-size: 24px; font-weight: 700; color: #2C2A29; z-index: 10; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="card" style="justify-content: center; align-items: center; text-align: center;">
            <div class="card-header" style="border:none; margin-bottom: 10px;">
                <h2 style="color: #4CAF50; font-size: 50px;">✅ คิวที่พร้อมรับ (Ready)</h2>
                <p style="font-size: 24px; color: #8E8D8A;">เชิญรับเครื่องดื่มที่เคาน์เตอร์ค่ะ</p>
            </div>
            <div id="display-ready" class="q-ready">...</div>
        </div>
    </div>

    <div class="right-panel">
        <div class="brand-logo">Balenrista.</div>
        <div class="card" style="padding: 0;">
            <video class="media-content" autoplay loop muted>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDITDHyj_6Z80vTp209yHUR8QHR2fAh-R0",
        authDomain: "balenrista---queue.firebaseapp.com",
        databaseURL: "https://balenrista---queue-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "balenrista---queue",
        storageBucket: "balenrista---queue.firebasestorage.app",
        messagingSenderId: "925008749007",
        appId: "1:925008749007:web:3b58b27eeb787c396ab2ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const queueRef = ref(db, 'queue/current');

    // ดักฟังการเปลี่ยนแปลงจาก Firebase ทันทีที่มีการกดเรียกคิว
    onValue(queueRef, (snapshot) => {
        let currentNumber = snapshot.val();
        if (currentNumber !== null) {
            document.getElementById('display-ready').innerText = currentNumber;
        } else {
            document.getElementById('display-ready').innerText = "0";
        }
    });
</script>

</body>
</html>
